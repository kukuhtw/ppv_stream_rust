<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Admin Payments — PPV Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/styles.css">
  <script src="/public/theme.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-md bg-danger shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-white" href="/public/admin/dashboard.html" data-platform="brand">🎬 PPV Stream</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="adminNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link text-white-50" href="/public/admin/dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link text-white fw-semibold active" href="/public/admin/payments.html">Payments</a></li>
        <li class="nav-item"><a class="nav-link text-white-50" href="/public/admin/wallet.html">Wallets</a></li>
        <li class="nav-item"><a class="nav-link text-white-50" href="/public/admin/settings.html">Settings</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2 mt-2 mt-md-0">
        <span class="badge bg-light text-danger fw-semibold">ADMIN</span>
        <button class="btn btn-sm btn-outline-light" onclick="toggleTheme()" id="themeToggle">☀️</button>
        <button id="logoutBtn" class="btn btn-sm btn-outline-light">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="container py-4 pb-5">
  <h1 class="mb-1 fs-4 fw-bold">Payments</h1>
  <p class="text-body-secondary small mb-4">Monitor fiat payments and process disbursements.</p>

  <!-- Filters -->
  <div class="row g-2 mb-3">
    <div class="col-12 col-md-4">
      <input id="searchQ" class="form-control" placeholder="Search user, video, invoice…">
    </div>
    <div class="col-6 col-md-2">
      <select id="filterStatus" class="form-select" onchange="loadPayments()">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="completed">Completed</option>
        <option value="rejected">Rejected</option>
      </select>
    </div>
    <div class="col-6 col-md-2">
      <select id="filterMethod" class="form-select" onchange="loadPayments()">
        <option value="">All methods</option>
        <option value="x402">x402</option>
        <option value="transfer">Bank Transfer</option>
        <option value="qris">QRIS</option>
        <option value="wallet">Wallet</option>
      </select>
    </div>
    <div class="col-12 col-md-2">
      <button class="btn btn-outline-secondary w-100" onclick="loadPayments()">↻ Refresh</button>
    </div>
  </div>

  <!-- Table -->
  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover tbl-compact mb-0">
          <thead class="table-light">
            <tr>
              <th>Date</th>
              <th>Invoice</th>
              <th>User</th>
              <th>Video</th>
              <th>Amount</th>
              <th>Method</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="paymentsBody">
            <tr><td colspan="8" class="text-body-secondary">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Disburse Modal -->
<div class="modal fade" id="disburseModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Process Payment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalInfo" class="mb-3 small text-body-secondary"></div>
        <div class="mb-3">
          <label for="modalNote" class="form-label">Admin Note <span class="text-body-secondary small">(optional)</span></label>
          <input id="modalNote" class="form-control" placeholder="e.g. Transfer confirmed via BCA ref #…">
        </div>
        <input type="hidden" id="modalPayId">
      </div>
      <div class="modal-footer gap-2">
        <button class="btn btn-success" onclick="processPayment('completed')">✓ Approve</button>
        <button class="btn btn-danger" onclick="processPayment('rejected')">✗ Reject</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let disburseModal;
document.addEventListener('DOMContentLoaded', () => {
  disburseModal = new bootstrap.Modal(document.getElementById('disburseModal'));
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/logout', { method:'POST' }).catch(()=>{});
  location.href = '/public/auth/login.html';
});

let searchTimer;
document.getElementById('searchQ').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadPayments, 300);
});

async function loadPayments() {
  const tbody   = document.getElementById('paymentsBody');
  const q       = document.getElementById('searchQ').value.trim();
  const status  = document.getElementById('filterStatus').value;
  const method  = document.getElementById('filterMethod').value;
  tbody.innerHTML = '<tr><td colspan="8" class="text-body-secondary">Loading…</td></tr>';
  try {
    const params = new URLSearchParams();
    if (q)      params.set('q', q);
    if (status) params.set('status', status);
    if (method) params.set('method', method);
    const j = await fetch('/api/admin/payments?' + params).then(r=>r.json());
    if (!j.ok || !Array.isArray(j.payments) || !j.payments.length) {
      tbody.innerHTML = '<tr><td colspan="8" class="text-body-secondary">No payments found.</td></tr>';
      return;
    }
    const statusBadge = s => {
      const map = { pending:'warning', completed:'success', rejected:'danger', processing:'info' };
      return `<span class="badge bg-${map[s]||'secondary'}">${esc(s)}</span>`;
    };
    const methodBadge = m => {
      if (m === 'x402')   return '<span class="badge badge-x402">x402</span>';
      if (m === 'wallet') return '<span class="badge badge-wallet">Wallet</span>';
      return `<span class="badge badge-fiat">${esc(m)}</span>`;
    };
    tbody.innerHTML = j.payments.map(p => `
      <tr>
        <td class="small text-nowrap">${esc((p.created_at||'').slice(0,16))}</td>
        <td class="small font-monospace" style="max-width:100px;overflow:hidden;text-overflow:ellipsis" title="${esc(p.invoice_uid||'')}">
          ${esc((p.invoice_uid||'—').slice(0,12))}…
        </td>
        <td class="small">${esc(p.username||p.user_id||'—')}</td>
        <td class="small">${esc(p.video_title||p.video_id||'—')}</td>
        <td class="small fw-semibold">$${((p.amount_cents||0)/100).toFixed(2)}</td>
        <td class="small">${methodBadge(p.method||'—')}</td>
        <td class="small">${statusBadge(p.status||'—')}</td>
        <td class="small">
          ${p.status === 'pending'
            ? `<button class="btn btn-sm btn-outline-primary py-0 px-2" onclick="openDisburse(${JSON.stringify(p.id)}, ${JSON.stringify(p)})">Process</button>`
            : '<span class="text-body-secondary">—</span>'}
        </td>
      </tr>`
    ).join('');
  } catch(e) { tbody.innerHTML = `<tr><td colspan="8" class="text-danger">${esc(String(e))}</td></tr>`; }
}

function openDisburse(id, p) {
  document.getElementById('modalPayId').value = id;
  document.getElementById('modalNote').value = '';
  document.getElementById('modalInfo').innerHTML =
    `Invoice: <code>${esc(p.invoice_uid||id)}</code><br>User: <strong>${esc(p.username||p.user_id||'—')}</strong><br>Amount: <strong>$${((p.amount_cents||0)/100).toFixed(2)}</strong><br>Method: ${esc(p.method||'—')}`;
  disburseModal.show();
}

async function processPayment(action) {
  const id   = document.getElementById('modalPayId').value;
  const note = document.getElementById('modalNote').value.trim();
  try {
    const j = await fetch('/api/admin/disburse', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: new URLSearchParams({ payment_id: id, action, note }) }).then(r=>r.json());
    disburseModal.hide();
    if (j.ok) { loadPayments(); }
    else alert('Failed: ' + (j.error||'unknown'));
  } catch(e) { alert('Error: ' + e.message); }
}

loadPayments();
</script>
</body>
</html>
