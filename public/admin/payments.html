<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Admin Payments - PPV Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/styles.css">
  <script src="/public/theme.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-md bg-danger shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-white" href="/public/admin/dashboard.html" data-platform="brand">PPV Stream</a>
    <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#adminNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="adminNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link text-white-50" href="/public/admin/dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link text-white fw-semibold active" href="/public/admin/payments.html">Payments</a></li>
        <li class="nav-item"><a class="nav-link text-white-50" href="/public/admin/wallet.html">Wallets</a></li>
        <li class="nav-item"><a class="nav-link text-white-50" href="/public/admin/settings.html">Settings</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2 mt-2 mt-md-0">
        <span class="badge bg-light text-danger fw-semibold">ADMIN</span>
        <button class="btn btn-sm btn-outline-light" onclick="toggleTheme()" id="themeToggle">Theme</button>
        <button id="logoutBtn" class="btn btn-sm btn-outline-light">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="container py-4 pb-5">
  <h1 class="mb-1 fs-4 fw-bold">Payments</h1>
  <p class="text-body-secondary small mb-4">Monitor payment invoices and manually disburse paid invoices to creators when required.</p>

  <div class="row g-2 mb-3">
    <div class="col-12 col-md-3">
      <select id="filterStatus" class="form-select" onchange="loadPayments()">
        <option value="">All statuses</option>
        <option value="pending">Pending</option>
        <option value="paid">Paid</option>
        <option value="failed">Failed</option>
      </select>
    </div>
    <div class="col-12 col-md-3">
      <select id="filterProvider" class="form-select" onchange="loadPayments()">
        <option value="">All providers</option>
        <option value="paypal">PayPal</option>
        <option value="stripe">Stripe</option>
        <option value="xendit">Xendit</option>
        <option value="midtrans">Midtrans</option>
      </select>
    </div>
    <div class="col-12 col-md-2">
      <button class="btn btn-outline-secondary w-100" onclick="loadPayments()">Refresh</button>
    </div>
  </div>

  <div class="card shadow-sm">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover tbl-compact mb-0">
          <thead class="table-light">
            <tr>
              <th>Date</th>
              <th>Invoice</th>
              <th>Buyer</th>
              <th>Video</th>
              <th>Creator</th>
              <th>Amount</th>
              <th>Provider</th>
              <th>Status</th>
              <th>Disbursement</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="paymentsBody">
            <tr><td colspan="10" class="text-body-secondary">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal fade" id="disburseModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Manual Disbursement</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="modalInfo" class="small text-body-secondary"></div>
        <input type="hidden" id="modalInvoiceUid">
      </div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="submitDisbursement()">Mark Disbursed</button>
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
let disburseModal;
document.addEventListener('DOMContentLoaded', () => {
  disburseModal = new bootstrap.Modal(document.getElementById('disburseModal'));
});

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/admin/logout', { method:'POST' }).catch(() => {});
  location.href = '/public/admin/login.html';
});

function esc(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

async function loadPayments() {
  const tbody = document.getElementById('paymentsBody');
  tbody.innerHTML = '<tr><td colspan="10" class="text-body-secondary">Loading...</td></tr>';
  try {
    const params = new URLSearchParams();
    const status = document.getElementById('filterStatus').value;
    const provider = document.getElementById('filterProvider').value;
    if (status) params.set('status', status);
    if (provider) params.set('provider', provider);
    const j = await fetch('/admin/payments?' + params).then(r => r.json());
    const items = Array.isArray(j.items) ? j.items : [];
    if (!j.ok || !items.length) {
      tbody.innerHTML = '<tr><td colspan="10" class="text-body-secondary">No invoices found.</td></tr>';
      return;
    }
    tbody.innerHTML = items.map(p => {
      const canDisburse = p.status === 'paid' && !p.disbursed_at;
      return `<tr>
        <td class="small text-nowrap">${esc((p.created_at || '').slice(0, 16))}</td>
        <td class="small font-monospace" title="${esc(p.invoice_uid || '')}">${esc((p.invoice_uid || '-').slice(0, 12))}</td>
        <td class="small">${esc(p.buyer_username || '-')}</td>
        <td class="small">${esc(p.video_title || '-')}</td>
        <td class="small">${esc(p.creator_username || '-')}</td>
        <td class="small fw-semibold">${esc(p.currency || 'USD')} ${Number(p.amount || 0).toFixed(2)}</td>
        <td class="small">${esc(p.provider || '-')}</td>
        <td class="small">${esc(p.status || '-')}</td>
        <td class="small">${p.disbursed_at ? esc((p.disbursed_at || '').slice(0, 16)) : '<span class="text-body-secondary">Not yet</span>'}</td>
        <td class="small">
          ${canDisburse
            ? `<button class="btn btn-sm btn-outline-primary py-0 px-2" onclick='openDisburse(${JSON.stringify(JSON.stringify(p))})'>Disburse</button>`
            : '<span class="text-body-secondary">-</span>'}
        </td>
      </tr>`;
    }).join('');
  } catch (err) {
    tbody.innerHTML = `<tr><td colspan="10" class="text-danger">${esc(String(err))}</td></tr>`;
  }
}

function openDisburse(raw) {
  const p = JSON.parse(raw);
  document.getElementById('modalInvoiceUid').value = p.invoice_uid || '';
  document.getElementById('modalInfo').innerHTML = `
    <div><strong>Invoice:</strong> <code>${esc(p.invoice_uid || '-')}</code></div>
    <div><strong>Buyer:</strong> ${esc(p.buyer_username || '-')}</div>
    <div><strong>Creator:</strong> ${esc(p.creator_username || '-')}</div>
    <div><strong>Amount:</strong> ${esc(p.currency || 'USD')} ${Number(p.amount || 0).toFixed(2)}</div>
    <div><strong>Provider:</strong> ${esc(p.provider || '-')}</div>
    <div><strong>Creator bank:</strong> ${esc(p.creator_bank || '-')}</div>
  `;
  disburseModal.show();
}

async function submitDisbursement() {
  const uid = document.getElementById('modalInvoiceUid').value;
  try {
    const j = await fetch(`/admin/payments/${encodeURIComponent(uid)}/disburse`, {
      method:'POST'
    }).then(r => r.json());
    if (!j.ok) {
      alert('Failed: ' + (j.error || 'unknown'));
      return;
    }
    disburseModal.hide();
    loadPayments();
  } catch (err) {
    alert('Error: ' + err.message);
  }
}

loadPayments();
</script>
</body>
</html>
