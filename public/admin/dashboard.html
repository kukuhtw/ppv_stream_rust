<!-- public/admin/dashboard.html -->
<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-md navbar-dark bg-danger shadow-sm">
  <div class="container">
    <span class="navbar-brand fw-bold">🛡️ Admin Panel</span>
    <div class="ms-auto">
      <a class="nav-link text-white" href="/browse">Browse Site</a>
    </div>
  </div>
</nav>

<div class="container py-4">
  <h1 class="mb-4">Admin Dashboard</h1>

  <div class="card shadow-sm">
    <div class="card-header fw-semibold">Ringkasan</div>
    <ul class="list-group list-group-flush">
      <li class="list-group-item d-flex justify-content-between align-items-center">
        Total Users
        <span id="u" class="badge bg-primary rounded-pill">-</span>
      </li>
      <li class="list-group-item d-flex justify-content-between align-items-center">
        Total Videos
        <span id="v" class="badge bg-primary rounded-pill">-</span>
      </li>
      <li class="list-group-item d-flex justify-content-between align-items-center">
        Total Purchases
        <span id="p" class="badge bg-success rounded-pill">-</span>
      </li>
    </ul>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(async () => {
  const r = await fetch('/admin/stats');
  const j = await r.json();
  document.getElementById('u').textContent = j.total_users;
  document.getElementById('v').textContent = j.total_videos;
  document.getElementById('p').textContent = j.total_purchases;
})();
</script>
</body>
</html>
