<!-- public/browse.html -->
<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Browse Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-md navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/public/browse.html">🎬 PPV Stream</a>
    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto mb-2 mb-md-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="/public/browse.html">Browse</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/public/dashboard.html">Dashboard</a>
        </li>
      </ul>
      <span id="userbar" class="badge bg-secondary text-white mt-2 mt-md-0">Memuat user…</span>
    </div>
  </div>
</nav>

<!-- Content -->
<div class="container py-4 pb-5">
  <h1 class="mb-4">Daftar Video</h1>

  <!-- Search & sort toolbar -->
  <div class="row g-2 mb-4">
    <div class="col-12 col-md-7">
      <input id="q" class="form-control" placeholder="Cari judul / owner / deskripsi…" aria-label="Pencarian">
    </div>
    <div class="col-12 col-md-3">
      <select id="sort" class="form-select">
        <option value="newest">Terbaru</option>
        <option value="cheapest">Termurah</option>
        <option value="expensive">Termahal</option>
        <option value="title">Judul (A-Z)</option>
      </select>
    </div>
  </div>

  <!-- Video grid -->
  <div id="videos" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3">
    <div class="col"><div class="skeleton"></div></div>
    <div class="col"><div class="skeleton"></div></div>
    <div class="col"><div class="skeleton"></div></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
function escapeHtml(s){
  return String(s ?? '')
    .replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;').replaceAll("'", '&#039;');
}

// ==== user bar ====
(async function loadMe(){
  try {
    const r = await fetch('/api/me');
    const j = await r.json();
    const el = document.getElementById('userbar');
    if (j.ok && j.user) {
      el.innerHTML = `<b>${escapeHtml(j.user.username)}</b> &lt;${escapeHtml(j.user.email)}&gt;`;
    } else {
      el.outerHTML = `<a href="/public/auth/login.html" class="btn btn-sm btn-outline-primary mt-2 mt-md-0">Login</a>`;
    }
  } catch {
    document.getElementById('userbar').textContent = '(gagal memuat)';
  }
})();

// ==== browse ====
let USD_TO_IDR = 17000;
const numIDR = new Intl.NumberFormat('id-ID');
let allVideos = [];

async function loadKurs() {
  try {
    const r = await fetch('/api/kurs');
    const j = await r.json();
    if (r.ok && j && typeof j.usd_to_idr === 'number') USD_TO_IDR = j.usd_to_idr;
  } catch {}
}

function makeContactHtml(v){
  const waDigits = (v.owner_whatsapp || '').replace(/\D/g, '');
  const waLink = waDigits ? `https://wa.me/${waDigits}` : null;
  const bank   = v.owner_bank         ? escapeHtml(v.owner_bank)         : '';
  const wallet = v.owner_wallet       ? escapeHtml(v.owner_wallet)       : '';
  const email  = v.owner_email        ? escapeHtml(v.owner_email)        : '';
  const prof   = v.owner_profile_desc ? escapeHtml(v.owner_profile_desc) : '';

  if (!email && !waDigits && !bank && !wallet && !prof) return '';

  return `
    <div class="mt-3 p-2 border rounded bg-light small">
      <div class="fw-semibold mb-1">Kontak Owner</div>
      <div>👤 ${escapeHtml(v.owner_name)}</div>
      ${email   ? `<div>✉️ ${email}</div>` : ''}
      ${waDigits? `<div>📱 <a href="${waLink}" target="_blank" rel="noopener">WhatsApp</a> (${escapeHtml(v.owner_whatsapp)})</div>` : ''}
      ${bank    ? `<div>🏦 ${bank}</div>`  : ''}
      ${wallet  ? `<div>💳 ${wallet}</div>`: ''}
      ${prof    ? `<div class="mt-1" style="white-space:pre-wrap">${prof}</div>` : ''}
    </div>`;
}

function render(list){
  const wrap = document.getElementById('videos');
  if (!list.length) {
    wrap.innerHTML = '<div class="col-12"><p class="text-muted">Belum ada video atau tidak ada yang cocok dengan pencarian.</p></div>';
    return;
  }
  wrap.innerHTML = list.map(v => {
    const idr  = Math.round((v.price_cents / 100) * USD_TO_IDR);
    const desc = (v.description || '').trim();
    return `
      <div class="col">
        <div class="card h-100 shadow-sm">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title">${escapeHtml(v.title)}</h5>
            <p class="mb-1"><strong>Owner:</strong> ${escapeHtml(v.owner_name)}</p>
            <p class="mb-2 fw-semibold">💰 Rp ${numIDR.format(idr)}</p>
            ${desc
              ? `<p class="card-text flex-grow-1" style="white-space:pre-wrap">${escapeHtml(desc)}</p>`
              : `<p class="card-text text-muted flex-grow-1">(Belum ada deskripsi)</p>`}
            <div class="mt-3">
              <a href="/public/watch.html?video_id=${encodeURIComponent(v.id)}"
                 class="btn btn-primary btn-sm w-100">▶ Tonton</a>
            </div>
            ${makeContactHtml(v)}
          </div>
        </div>
      </div>`;
  }).join('');
}

function applyFilters(){
  const q    = document.getElementById('q').value.trim().toLowerCase();
  const sort = document.getElementById('sort').value;
  let list   = [...allVideos];

  if (q) list = list.filter(v =>
    `${v.title} ${v.owner_name} ${v.description||''} ${v.owner_profile_desc||''}`.toLowerCase().includes(q));

  switch (sort) {
    case 'cheapest':  list.sort((a,b) => a.price_cents - b.price_cents); break;
    case 'expensive': list.sort((a,b) => b.price_cents - a.price_cents); break;
    case 'title':     list.sort((a,b) => a.title.localeCompare(b.title)); break;
    default: list.sort((a,b) => (b.created_at > a.created_at) ? 1 : (b.created_at < a.created_at ? -1 : 0));
  }
  render(list);
}

let t;
document.getElementById('q').addEventListener('input', () => { clearTimeout(t); t = setTimeout(applyFilters, 200); });
document.getElementById('sort').addEventListener('change', applyFilters);

(async function init(){
  await loadKurs();
  try {
    const res  = await fetch('/api/videos');
    const data = await res.json();
    if (!res.ok || data.ok === false) throw new Error(data.error || 'Gagal memuat /api/videos');
    allVideos = Array.isArray(data.videos) ? data.videos : [];
    applyFilters();
  } catch (e) {
    document.getElementById('videos').innerHTML =
      `<div class="col-12"><p class="text-muted">Gagal memuat video: ${escapeHtml(String(e))}</p></div>`;
  }
})();
</script>
</body>
</html>
