<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Watch — PPV Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <script src="/public/theme.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-md bg-body-tertiary shadow-sm border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/public/browse.html" data-platform="brand">🎬 PPV Stream</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/public/browse.html">Browse</a></li>
        <li class="nav-item"><a class="nav-link" href="/public/dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/public/wallet.html">Wallet</a></li>
        <li class="nav-item"><a class="nav-link" href="/public/affiliate.html">Affiliate</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2 mt-2 mt-md-0">
        <span id="userbar" class="badge bg-secondary">Loading…</span>
        <button class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()" id="themeToggle">☀️</button>
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="container py-4 pb-5" id="mainContent">
  <div class="skeleton mb-3" style="height:2rem;max-width:400px"></div>
  <div class="skeleton mb-4" style="height:1rem;max-width:200px"></div>
  <div class="skeleton" style="height:360px"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const params    = new URLSearchParams(location.search);
const VIDEO_ID  = params.get('video_id') || '';
const REF       = params.get('ref')      || '';
let   USD_TO_IDR = 17000;
let   fmtIdr     = new Intl.NumberFormat('id-ID');
let   currentUser = null;

// ── user bar + logout ──
(async function(){
  try {
    const j = await fetch('/api/me').then(r=>r.json());
    const el = document.getElementById('userbar');
    if (j.ok && j.user) {
      el.innerHTML = `<b>${esc(j.user.username)}</b> &lt;${esc(j.user.email)}&gt;`;
      currentUser = j.user;
    } else {
      el.innerHTML = `<a href="/public/auth/login.html" class="text-white">Sign In</a>`;
    }
  } catch {}
})();
document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/logout', { method:'POST' }).catch(()=>{});
  location.href = '/public/auth/login.html?status=ok';
});

if (!VIDEO_ID) {
  document.getElementById('mainContent').innerHTML = '<p class="text-danger">No video specified. <a href="/public/browse.html">Browse videos →</a></p>';
} else {
  init();
}

async function init() {
  try { const k = await fetch('/api/kurs').then(r=>r.json()); if(k.usd_to_idr) USD_TO_IDR = k.usd_to_idr; } catch {}

  let video;
  try {
    const j = await fetch('/api/video?' + new URLSearchParams({ id: VIDEO_ID })).then(r=>r.json());
    if (!j.ok || !j.video) throw new Error(j.error || 'Video not found');
    video = j.video;
  } catch(e) {
    document.getElementById('mainContent').innerHTML = `<p class="text-danger">Error loading video: ${esc(String(e))}</p>`;
    return;
  }

  // check access
  let hasAccess = false;
  try {
    const j = await fetch('/api/check_access?' + new URLSearchParams({ video_id: VIDEO_ID })).then(r=>r.json());
    hasAccess = j.ok && j.has_access;
  } catch {}

  const priceCents = video.price_cents || 0;
  const isFree     = priceCents === 0;
  const priceUsd   = (priceCents/100).toFixed(2);
  const priceIdr   = 'Rp ' + fmtIdr.format(Math.round(priceCents/100*USD_TO_IDR));

  let html = `
    <div class="mb-3">
      <a href="/public/browse.html" class="text-body-secondary text-decoration-none small">← Back to Browse</a>
    </div>
    <h1 class="fs-4 fw-bold mb-1">${esc(video.title)}</h1>
    <p class="text-body-secondary small mb-3">
      by <strong>${esc(video.owner_name||'—')}</strong>
      ${priceCents > 0 ? `&nbsp;•&nbsp; <span class="fw-semibold text-primary">$${priceUsd} (${priceIdr})</span>` : '<span class="badge bg-success">Free</span>'}
      ${REF ? `&nbsp;•&nbsp; <span class="badge bg-secondary-subtle text-secondary-emphasis border border-secondary-subtle">via ${esc(REF)}</span>` : ''}
    </p>`;

  if (hasAccess || isFree) {
    html += renderPlayer(video);
  } else {
    html += renderLocked(video, priceUsd, priceIdr);
  }

  if (video.description) {
    html += `<div class="card shadow-sm mt-4"><div class="card-body"><h6 class="fw-semibold mb-2">About this video</h6><p class="mb-0 small text-body-secondary">${esc(video.description)}</p></div></div>`;
  }

  document.getElementById('mainContent').innerHTML = html;

  if (hasAccess || isFree) {
    startPlayer(video);
  } else {
    bindPaymentTabs(video, priceCents, priceUsd);
  }
}

function renderPlayer(video) {
  return `
    <div class="ratio ratio-16x9 rounded overflow-hidden bg-black mb-3 shadow">
      <video id="hlsPlayer" controls playsinline class="w-100 h-100"></video>
    </div>`;
}

function startPlayer(video) {
  const player = document.getElementById('hlsPlayer');
  if (!player) return;
  const src = `/stream/${esc(video.id)}/playlist.m3u8`;
  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(src);
    hls.attachMedia(player);
  } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
    player.src = src;
  } else {
    player.parentElement.innerHTML = '<p class="text-warning p-4">Your browser does not support HLS playback.</p>';
  }
}

function renderLocked(video, priceUsd, priceIdr) {
  return `
    <div class="ratio ratio-16x9 rounded overflow-hidden bg-black mb-4 shadow d-flex align-items-center justify-content-center">
      <div class="text-center text-white p-4">
        <div style="font-size:3rem">🔒</div>
        <div class="mt-2 fw-semibold">This video requires payment to unlock</div>
        <div class="text-secondary small">$${esc(priceUsd)} · ${esc(priceIdr)}</div>
      </div>
    </div>
    <div class="card shadow-sm mb-4">
      <div class="card-header fw-semibold">Unlock This Video — $${esc(priceUsd)}</div>
      <div class="card-body">
        <ul class="nav nav-tabs mb-3" id="payTabs">
          <li class="nav-item"><button class="nav-link active" data-pay="wallet" onclick="switchPay('wallet')">💳 Wallet</button></li>
          <li class="nav-item"><button class="nav-link" data-pay="x402" onclick="switchPay('x402')">⛓ Crypto (x402)</button></li>
          <li class="nav-item"><button class="nav-link" data-pay="fiat" onclick="switchPay('fiat')">🏦 Bank Transfer</button></li>
        </ul>
        <div id="payAlert" class="d-none mb-3"></div>

        <!-- Wallet payment -->
        <div id="pay-wallet">
          <p class="small text-body-secondary">Pay from your PPV Stream wallet balance. Fast and instant.</p>
          <div class="mb-2 small">Balance: <strong id="walletBal">Loading…</strong></div>
          <button class="btn btn-primary" onclick="payWallet()">Pay $${esc(priceUsd)} from Wallet</button>
        </div>

        <!-- x402 / crypto -->
        <div id="pay-x402" class="d-none">
          <p class="small text-body-secondary">Pay with USDC on a supported EVM chain. Confirmation is automatic.</p>
          <button class="btn btn-primary" onclick="payX402()">Pay $${esc(priceUsd)} via Crypto</button>
          <div id="x402Instructions" class="mt-3 d-none p-3 rounded border font-monospace small"></div>
        </div>

        <!-- Bank transfer -->
        <div id="pay-fiat" class="d-none">
          <p class="small text-body-secondary">Transfer via bank or QRIS. Access is granted after admin confirms payment.</p>
          <div id="fiatInfo" class="mb-3 small text-body-secondary">Loading seller's payment info…</div>
          <div class="row g-3">
            <div class="col-md-4">
              <label for="fiatAmt" class="form-label">Amount Sent (IDR)</label>
              <input id="fiatAmt" type="number" min="1000" class="form-control" placeholder="e.g. 170000">
            </div>
            <div class="col-12">
              <button class="btn btn-primary" onclick="payFiat()">Confirm Manual Payment</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
}

function switchPay(tab) {
  ['wallet','x402','fiat'].forEach(t => {
    document.getElementById('pay-' + t).classList.toggle('d-none', t !== tab);
  });
  document.querySelectorAll('#payTabs .nav-link').forEach(b => b.classList.toggle('active', b.dataset.pay === tab));
}

function bindPaymentTabs(video, priceCents, priceUsd) {
  // load wallet balance
  fetch('/api/wallet/balance').then(r=>r.json()).then(j => {
    const el = document.getElementById('walletBal');
    if (el) el.textContent = j.ok ? '$' + ((j.balance_cents||0)/100).toFixed(2) : '—';
  }).catch(() => {});

  // load fiat info (seller profile)
  fetch('/api/profile_public?' + new URLSearchParams({ owner_id: video.owner_id })).then(r=>r.json()).then(j => {
    const el = document.getElementById('fiatInfo');
    if (!el) return;
    if (j.ok && j.profile) {
      const p = j.profile;
      el.innerHTML = `Transfer <strong>Rp ${fmtIdr.format(Math.round(priceCents/100*USD_TO_IDR))}</strong> to:<br>` +
        (p.bank_account ? `Bank: <code>${esc(p.bank_account)}</code><br>` : '') +
        (p.whatsapp ? `WhatsApp: <code>${esc(p.whatsapp)}</code><br>` : '') +
        `<span class="text-warning">After payment, confirm below. Access is granted after seller verification.</span>`;
    } else {
      el.textContent = 'Seller has not configured payment info. Contact them directly.';
    }
  }).catch(() => {});
}

async function payWallet() {
  const btn = event.currentTarget; btn.disabled=true; btn.textContent='Processing…';
  const alert = document.getElementById('payAlert'); alert.className='d-none';
  try {
    const j = await fetch('/api/pay_wallet', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: new URLSearchParams({ video_id: VIDEO_ID, ref: REF }) }).then(r=>r.json());
    if (j.ok) { showPayAlert('success', 'Payment successful! Loading video…'); setTimeout(() => location.reload(), 1500); }
    else showPayAlert('danger', 'Failed: ' + (j.error||'unknown'));
  } catch(e) { showPayAlert('danger', 'Error: ' + e.message); }
  finally { btn.disabled=false; btn.textContent='Pay from Wallet'; }
}

async function payX402() {
  const btn = event.currentTarget; btn.disabled=true; btn.textContent='Preparing…';
  const alert = document.getElementById('payAlert'); alert.className='d-none';
  try {
    const j = await fetch('/api/pay_x402_init', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: new URLSearchParams({ video_id: VIDEO_ID, ref: REF }) }).then(r=>r.json());
    if (!j.ok) { showPayAlert('danger', 'Failed: ' + (j.error||'unknown')); return; }
    const box = document.getElementById('x402Instructions');
    box.classList.remove('d-none');
    box.innerHTML = `Send <strong>${j.amount} USDC</strong> to <code>${esc(j.address)}</code> on chain <code>${esc(String(j.chain_id))}</code>.<br>Invoice: <code>${esc(j.invoice_uid)}</code><br><span class="text-body-secondary">Confirmation is automatic. Refresh this page after payment.</span>`;
    showPayAlert('info', 'Send payment to the address above. The page will unlock automatically after confirmation.');
  } catch(e) { showPayAlert('danger', 'Error: ' + e.message); }
  finally { btn.disabled=false; btn.textContent='Pay via Crypto'; }
}

async function payFiat() {
  const amtEl = document.getElementById('fiatAmt');
  const amt = parseInt(amtEl.value, 10);
  if (!amt || amt < 1000) return alert('Enter the amount you transferred (min Rp 1,000).');
  const btn = event.currentTarget; btn.disabled=true; btn.textContent='Submitting…';
  const alert = document.getElementById('payAlert'); alert.className='d-none';
  try {
    const j = await fetch('/api/pay_fiat', { method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body: new URLSearchParams({ video_id: VIDEO_ID, amount_idr: amt, ref: REF }) }).then(r=>r.json());
    if (j.ok) showPayAlert('success', 'Payment submitted. Access will be granted after the seller confirms receipt.');
    else showPayAlert('danger', 'Failed: ' + (j.error||'unknown'));
  } catch(e) { showPayAlert('danger', 'Error: ' + e.message); }
  finally { btn.disabled=false; btn.textContent='Confirm Manual Payment'; }
}

function showPayAlert(type, msg) {
  const el = document.getElementById('payAlert');
  if (!el) return;
  el.className = `alert alert-${type}`;
  el.textContent = msg;
}
</script>
</body>
</html>
