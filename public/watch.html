<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Watch - PPV Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/styles.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
  <script src="/public/theme.js"></script>
</head>
<body>

<nav class="navbar navbar-expand-md bg-body-tertiary shadow-sm border-bottom">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/public/browse.html" data-platform="brand">PPV Stream</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/public/browse.html">Browse</a></li>
        <li class="nav-item"><a class="nav-link" href="/public/dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="/public/wallet.html">Wallet</a></li>
        <li class="nav-item"><a class="nav-link" href="/public/affiliate.html">Affiliate</a></li>
      </ul>
      <div class="d-flex align-items-center gap-2 mt-2 mt-md-0">
        <span id="userbar" class="badge bg-secondary">Loading...</span>
        <button class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()" id="themeToggle">Theme</button>
        <button id="logoutBtn" class="btn btn-sm btn-outline-danger">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="container py-4 pb-5" id="mainContent">
  <div class="skeleton mb-3" style="height:2rem;max-width:420px"></div>
  <div class="skeleton mb-4" style="height:1rem;max-width:320px"></div>
  <div class="skeleton" style="height:360px"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const params = new URLSearchParams(location.search);
const VIDEO_ID = params.get('video_id') || '';
const REF = params.get('ref') || '';

let USD_TO_IDR = 17000;
let currentUser = null;
let currentVideo = null;
let paymentOptions = null;
const fmtIdr = new Intl.NumberFormat('id-ID');

function esc(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function showPayAlert(type, msg) {
  const el = document.getElementById('payAlert');
  if (!el) return;
  el.className = `alert alert-${type}`;
  el.textContent = msg;
}

(async function initUserBar() {
  try {
    const j = await fetch('/api/me').then(r => r.json());
    const el = document.getElementById('userbar');
    if (j.ok && j.user) {
      currentUser = j.user;
      el.innerHTML = `<b>${esc(j.user.username)}</b> &lt;${esc(j.user.email)}&gt;`;
    } else {
      el.innerHTML = `<a href="/public/auth/login.html" class="text-white">Sign In</a>`;
    }
  } catch {}
})();

document.getElementById('logoutBtn').addEventListener('click', async () => {
  await fetch('/auth/logout', { method:'POST' }).catch(() => {});
  location.href = '/public/auth/login.html?status=ok';
});

if (!VIDEO_ID) {
  document.getElementById('mainContent').innerHTML = '<p class="text-danger">No video specified. <a href="/public/browse.html">Browse videos</a></p>';
} else {
  init();
}

async function init() {
  try {
    const k = await fetch('/api/kurs').then(r => r.json());
    if (k.usd_to_idr) USD_TO_IDR = k.usd_to_idr;
  } catch {}

  try {
    const videosResp = await fetch('/api/videos').then(r => r.json());
    const videos = Array.isArray(videosResp.videos) ? videosResp.videos : [];
    currentVideo = videos.find(v => String(v.id) === VIDEO_ID) || null;
    if (!currentVideo) throw new Error('Video not found');
  } catch (err) {
    document.getElementById('mainContent').innerHTML = `<p class="text-danger">Error loading video: ${esc(String(err))}</p>`;
    return;
  }

  try {
    paymentOptions = await fetch('/api/pay/all_options?' + new URLSearchParams({ video_id: VIDEO_ID })).then(r => r.json());
  } catch {
    paymentOptions = null;
  }

  let playResp = null;
  try {
    const resp = await fetch('/api/request_play?' + new URLSearchParams({ video_id: VIDEO_ID }));
    playResp = await resp.json();
  } catch {}

  renderPage(playResp);
}

function renderPage(playResp) {
  const video = currentVideo;
  const priceCents = video.price_cents || 0;
  const priceUsd = (priceCents / 100).toFixed(2);
  const priceIdr = 'Rp ' + fmtIdr.format(Math.round(priceCents / 100 * USD_TO_IDR));
  const affiliateEnabled = !!(paymentOptions && paymentOptions.ok && paymentOptions.video_id);
  const hasAccess = !!(playResp && playResp.ok && playResp.playlist);

  let html = `
    <div class="mb-3">
      <a href="/public/browse.html" class="text-body-secondary text-decoration-none small">Back to Browse</a>
    </div>
    <h1 class="fs-4 fw-bold mb-1">${esc(video.title)}</h1>
    <p class="text-body-secondary small mb-2">
      by <strong>${esc(video.owner_name || '-')}</strong>
      ${priceCents > 0 ? ` | <span class="fw-semibold text-primary">$${priceUsd} (${priceIdr})</span>` : '<span class="badge bg-success">Free</span>'}
      ${REF ? ` | <span class="badge bg-secondary-subtle text-secondary-emphasis border border-secondary-subtle">ref ${esc(REF)}</span>` : ''}
    </p>
  `;

  if (affiliateEnabled && REF) {
    html += `<div class="alert alert-info py-2 small mb-4">This visit includes affiliate referral code <strong>${esc(REF)}</strong>.</div>`;
  }

  html += hasAccess ? renderPlayer(playResp.playlist) : renderLocked(priceUsd, priceIdr);

  if (video.description) {
    html += `<div class="card shadow-sm mt-4"><div class="card-body"><h6 class="fw-semibold mb-2">About this video</h6><p class="mb-0 small text-body-secondary">${esc(video.description)}</p></div></div>`;
  }

  document.getElementById('mainContent').innerHTML = html;

  if (hasAccess) {
    startPlayer(playResp.playlist);
  } else {
    bindLockedState();
  }
}

function renderPlayer(playlistUrl) {
  return `
    <div class="ratio ratio-16x9 rounded overflow-hidden bg-black mb-3 shadow">
      <video id="hlsPlayer" controls playsinline class="w-100 h-100" data-playlist="${esc(playlistUrl)}"></video>
    </div>`;
}

function startPlayer(playlistUrl) {
  const player = document.getElementById('hlsPlayer');
  if (!player) return;
  const src = playlistUrl;
  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(src);
    hls.attachMedia(player);
  } else if (player.canPlayType('application/vnd.apple.mpegurl')) {
    player.src = src;
  } else {
    player.parentElement.innerHTML = '<p class="text-warning p-4">Your browser does not support HLS playback.</p>';
  }
}

function renderLocked(priceUsd, priceIdr) {
  return `
    <div class="ratio ratio-16x9 rounded overflow-hidden bg-black mb-4 shadow d-flex align-items-center justify-content-center">
      <div class="text-center text-white p-4">
        <div class="fs-2 fw-bold">Locked</div>
        <div class="mt-2">Purchase this video to unlock playback.</div>
        <div class="text-secondary small">$${esc(priceUsd)} | ${esc(priceIdr)}</div>
      </div>
    </div>
    <div class="card shadow-sm mb-4">
      <div class="card-header fw-semibold">Unlock This Video</div>
      <div class="card-body">
        <div id="payAlert" class="d-none mb-3"></div>
        <div id="lockedSummary" class="small text-body-secondary mb-3"></div>
        <ul class="nav nav-tabs mb-3" id="payTabs"></ul>
        <div id="payPanels"></div>
      </div>
    </div>`;
}

async function bindLockedState() {
  const summary = document.getElementById('lockedSummary');
  if (!currentUser) {
    summary.innerHTML = `You need to <a href="/public/auth/login.html">sign in</a> before buying or viewing this video.`;
  } else if (paymentOptions?.already_purchased) {
    summary.textContent = 'Your purchase is already recorded. Reload the page if playback has not started yet.';
  } else {
    summary.textContent = 'Choose one of the enabled payment methods below.';
  }

  const tabs = [];
  const panels = [];

  if (paymentOptions?.wallet?.available) {
    tabs.push(`<li class="nav-item"><button class="nav-link active" data-pay="wallet" onclick="switchPay('wallet')">Wallet</button></li>`);
    panels.push(`
      <div id="pay-wallet">
        <p class="small text-body-secondary">Instant purchase using your platform wallet balance.</p>
        <div class="mb-2 small">Balance: <strong>${esc(paymentOptions.wallet.balance_display || '-') }</strong></div>
        <button class="btn btn-primary" onclick="payWallet()">Pay with Wallet</button>
      </div>
    `);
  }

  if (paymentOptions?.x402?.available) {
    tabs.push(`<li class="nav-item"><button class="nav-link ${tabs.length ? '' : 'active'}" data-pay="x402" onclick="switchPay('x402')">Blockchain x402</button></li>`);
    const tokens = Array.isArray(paymentOptions.x402.tokens) ? paymentOptions.x402.tokens : [];
    panels.push(`
      <div id="pay-x402" class="${tabs[0].includes('wallet') ? 'd-none' : ''}">
        <p class="small text-body-secondary">Create an x402 invoice, then complete the onchain payment using your EVM wallet.</p>
        <div class="row g-3">
          <div class="col-md-6">
            <label for="x402Token" class="form-label">Token</label>
            <select id="x402Token" class="form-select">
              ${tokens.map((token, index) => `<option value="${index}">${esc(token.chain)} | ${esc(token.symbol)} | chain ${esc(token.chain_id)}</option>`).join('')}
            </select>
          </div>
          <div class="col-md-6">
            <label for="x402Payer" class="form-label">Your Wallet Address</label>
            <input id="x402Payer" class="form-control font-monospace" placeholder="0x...">
          </div>
          <div class="col-12">
            <button class="btn btn-primary" onclick="payX402()">Create x402 Invoice</button>
          </div>
        </div>
        <div id="x402Instructions" class="mt-3 d-none p-3 rounded border bg-body-tertiary small"></div>
      </div>
    `);
  }

  if (paymentOptions?.fiat?.available) {
    tabs.push(`<li class="nav-item"><button class="nav-link ${tabs.length ? '' : 'active'}" data-pay="fiat" onclick="switchPay('fiat')">Payment Gateway</button></li>`);
    const providers = Array.isArray(paymentOptions.fiat.providers) ? paymentOptions.fiat.providers : [];
    panels.push(`
      <div id="pay-fiat" class="${tabs.length > 1 ? 'd-none' : ''}">
        <p class="small text-body-secondary">Create a hosted invoice using one of the enabled providers.</p>
        <div class="d-flex flex-wrap gap-2">
          ${providers.map(provider => `<button class="btn btn-outline-primary" onclick="startProviderPayment('${esc(provider)}')">${esc(provider)}</button>`).join('')}
        </div>
        <div id="fiatInfo" class="small text-body-secondary mt-3"></div>
      </div>
    `);
  }

  if (!tabs.length) {
    document.getElementById('payTabs').outerHTML = '<div class="alert alert-warning mb-0">No payment method is currently enabled for this video.</div>';
    document.getElementById('payPanels').innerHTML = '';
  } else {
    document.getElementById('payTabs').innerHTML = tabs.join('');
    document.getElementById('payPanels').innerHTML = panels.join('');
  }

  try {
    const profile = await fetch('/api/user_profile?' + new URLSearchParams({ user_id: currentVideo.owner_id })).then(r => r.json());
    const info = document.getElementById('fiatInfo');
    if (info && profile.ok && profile.profile) {
      const p = profile.profile;
      info.innerHTML = `
        Creator payout profile:
        ${p.bank_account ? `<div>Bank: <code>${esc(p.bank_account)}</code></div>` : ''}
        ${p.whatsapp ? `<div>WhatsApp: <code>${esc(p.whatsapp)}</code></div>` : ''}
      `;
    }
  } catch {}
}

function switchPay(tab) {
  ['wallet', 'x402', 'fiat'].forEach(t => {
    const panel = document.getElementById('pay-' + t);
    if (panel) panel.classList.toggle('d-none', t !== tab);
  });
  document.querySelectorAll('#payTabs .nav-link').forEach(b => b.classList.toggle('active', b.dataset.pay === tab));
}

async function payWallet() {
  const alertBox = document.getElementById('payAlert');
  alertBox.className = 'd-none';
  try {
    const j = await fetch('/api/wallet/pay', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ video_id: VIDEO_ID, ref_code: REF || null })
    }).then(r => r.json());
    if (!j.ok) {
      showPayAlert('danger', 'Failed: ' + (j.error || 'unknown'));
      return;
    }
    showPayAlert('success', j.message || 'Payment successful. Reloading...');
    setTimeout(() => location.reload(), 1200);
  } catch (err) {
    showPayAlert('danger', 'Error: ' + err.message);
  }
}

async function payX402() {
  const payer = document.getElementById('x402Payer').value.trim();
  if (!/^0x[a-fA-F0-9]{40}$/.test(payer)) {
    showPayAlert('danger', 'Enter a valid EVM wallet address.');
    return;
  }
  const tokenIndex = parseInt(document.getElementById('x402Token').value, 10);
  const token = paymentOptions?.x402?.tokens?.[tokenIndex];
  if (!token) {
    showPayAlert('danger', 'Token configuration not found.');
    return;
  }
  try {
    const j = await fetch('/api/pay/x402/start', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        video_id: VIDEO_ID,
        chain_id: token.chain_id,
        symbol: token.symbol,
        token_address: token.erc20 || null,
        payer_address: payer,
        ref_code: REF || null
      })
    }).then(r => r.json());
    if (!j.ok) {
      showPayAlert('danger', 'Failed: ' + (j.error || 'unknown'));
      return;
    }
    const box = document.getElementById('x402Instructions');
    box.classList.remove('d-none');
    box.innerHTML = `
      <div><strong>Invoice UID:</strong> <code>${esc(j.invoice_uid)}</code></div>
      <div><strong>Contract:</strong> <code>${esc(j.x402_contract)}</code></div>
      <div><strong>Creator Wallet:</strong> <code>${esc(j.creator_wallet)}</code></div>
      <div><strong>Token:</strong> ${esc(j.symbol)} on chain ${esc(j.chain_id)}</div>
      <div><strong>Amount (wei/base units):</strong> <code>${esc(j.amount_wei)}</code></div>
      <div class="mt-2 text-body-secondary">Use these values in your EVM payment flow, then confirm the transaction from your wallet tooling.</div>
    `;
    showPayAlert('info', 'x402 invoice created. Complete the onchain payment using the returned contract parameters.');
  } catch (err) {
    showPayAlert('danger', 'Error: ' + err.message);
  }
}

async function startProviderPayment(provider) {
  try {
    const j = await fetch(`/api/pay/${encodeURIComponent(provider)}/start`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        user_id: currentUser?.id || '',
        video_id: VIDEO_ID,
        amount_cents: currentVideo.price_cents || 0,
        currency: 'USD',
        buyer_email: currentUser?.email || null,
        affiliate_ref: REF || null,
        success_url: location.href,
        cancel_url: location.href
      })
    }).then(r => r.json());
    if (!j.ok) {
      showPayAlert('danger', 'Failed: ' + (j.error || 'unknown'));
      return;
    }
    if (j.payment_url) {
      location.href = j.payment_url;
      return;
    }
    showPayAlert('success', 'Invoice created: ' + (j.invoice_uid || j.invoice_id || 'ready'));
  } catch (err) {
    showPayAlert('danger', 'Error: ' + err.message);
  }
}
</script>
</body>
</html>
