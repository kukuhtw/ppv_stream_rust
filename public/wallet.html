<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>My Wallet – PPV Stream</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,-apple-system,sans-serif;background:#0f0f0f;color:#e8e8e8;min-height:100vh}
    a{color:#a78bfa;text-decoration:none}
    a:hover{text-decoration:underline}

    header{background:#1a1a2e;border-bottom:1px solid #2a2a4a;padding:14px 24px;display:flex;align-items:center;gap:16px}
    header h1{font-size:1.1rem;font-weight:600;color:#c4b5fd}
    header nav{margin-left:auto;display:flex;gap:16px;font-size:.9rem}

    .container{max-width:900px;margin:32px auto;padding:0 16px}

    .balance-card{background:linear-gradient(135deg,#1e1b4b,#312e81);border:1px solid #4338ca;border-radius:16px;padding:28px 32px;margin-bottom:28px}
    .balance-card .label{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:#a5b4fc;margin-bottom:6px}
    .balance-card .amount{font-size:2.4rem;font-weight:700;color:#e0e7ff;letter-spacing:-.5px}
    .balance-card .sub{font-size:.85rem;color:#818cf8;margin-top:4px}

    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;margin-bottom:28px}
    .card{background:#1a1a2e;border:1px solid #2a2a4a;border-radius:12px;padding:22px}
    .card h3{font-size:.95rem;font-weight:600;margin-bottom:16px;color:#c4b5fd}

    label{display:block;font-size:.82rem;color:#9ca3af;margin-bottom:4px;margin-top:12px}
    label:first-of-type{margin-top:0}
    input,textarea{width:100%;background:#0f0f0f;border:1px solid #374151;color:#e8e8e8;border-radius:7px;padding:9px 12px;font-size:.9rem}
    input:focus,textarea:focus{outline:none;border-color:#6366f1}
    textarea{resize:vertical;min-height:60px}

    .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:8px;font-size:.88rem;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
    .btn:hover{opacity:.85}
    .btn-primary{background:#6366f1;color:#fff}
    .btn-success{background:#10b981;color:#fff}
    .btn-warning{background:#f59e0b;color:#000}
    .btn-full{width:100%;margin-top:14px}

    .msg{border-radius:7px;padding:10px 14px;font-size:.85rem;margin-top:10px;display:none}
    .msg.ok{background:#064e3b;color:#6ee7b7;border:1px solid #065f46}
    .msg.err{background:#450a0a;color:#fca5a5;border:1px solid #7f1d1d}
    .msg.show{display:block}

    .txn-table{width:100%;border-collapse:collapse;font-size:.82rem}
    .txn-table thead th{background:#12122a;color:#818cf8;text-align:left;padding:10px 12px;border-bottom:1px solid #2a2a4a;font-weight:500;text-transform:uppercase;font-size:.75rem;letter-spacing:.05em}
    .txn-table tbody tr:hover{background:rgba(99,102,241,.05)}
    .txn-table td{padding:10px 12px;border-bottom:1px solid #1e1e38;vertical-align:middle}
    .txn-table .mono{font-family:ui-monospace,monospace}

    .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.72rem;font-weight:600;text-transform:uppercase}
    .badge-green{background:#064e3b;color:#6ee7b7}
    .badge-yellow{background:#451a03;color:#fcd34d}
    .badge-red{background:#450a0a;color:#fca5a5}
    .badge-blue{background:#1e3a5f;color:#93c5fd}

    .type-deposit{color:#34d399}
    .type-withdrawal{color:#f87171}
    .type-transfer_in{color:#60a5fa}
    .type-transfer_out{color:#fb923c}

    .section-title{font-size:.85rem;text-transform:uppercase;letter-spacing:.07em;color:#6366f1;margin-bottom:14px;font-weight:600}
    .min-note{font-size:.76rem;color:#6b7280;margin-top:4px}
  </style>
</head>
<body>

<header>
  <h1>PPV Stream &rsaquo; Wallet</h1>
  <nav>
    <a href="/public/dashboard.html">Dashboard</a>
    <a href="/public/browse.html">Browse</a>
    <a href="#" id="logoutBtn">Logout</a>
  </nav>
</header>

<div class="container">

  <!-- Balance Card -->
  <div class="balance-card">
    <div class="label">Available Balance</div>
    <div class="amount" id="balanceDisplay">—</div>
    <div class="sub" id="balanceCents"></div>
  </div>

  <!-- Action Cards -->
  <div class="grid">

    <!-- Deposit -->
    <div class="card">
      <h3>Request Deposit</h3>
      <label>Amount (cents, e.g. 5000 = $50)</label>
      <input type="number" id="depositAmount" min="1000" placeholder="1000">
      <p class="min-note">Minimum: $10.00</p>
      <label>Note (optional)</label>
      <textarea id="depositNote" placeholder="Bank transfer reference, etc."></textarea>
      <button class="btn btn-success btn-full" onclick="doDeposit()">Submit Deposit Request</button>
      <div class="msg" id="depositMsg"></div>
    </div>

    <!-- Withdraw -->
    <div class="card">
      <h3>Request Withdrawal</h3>
      <label>Amount (cents, e.g. 5000 = $50)</label>
      <input type="number" id="withdrawAmount" min="5000" placeholder="5000">
      <p class="min-note">Minimum: $50.00</p>
      <label>Note (bank account, wallet, etc.)</label>
      <textarea id="withdrawNote" placeholder="Send to: BCA 1234567890 / John Doe"></textarea>
      <button class="btn btn-warning btn-full" onclick="doWithdraw()">Submit Withdrawal Request</button>
      <div class="msg" id="withdrawMsg"></div>
    </div>

    <!-- Transfer -->
    <div class="card">
      <h3>Transfer to User</h3>
      <label>Recipient Username</label>
      <input type="text" id="transferTo" placeholder="username">
      <label>Amount (cents, e.g. 100 = $1)</label>
      <input type="number" id="transferAmount" min="100" placeholder="100">
      <p class="min-note">Minimum: $1.00 · Instant, no approval needed</p>
      <label>Note (optional)</label>
      <input type="text" id="transferNote" placeholder="Payment for…">
      <button class="btn btn-primary btn-full" onclick="doTransfer()">Send</button>
      <div class="msg" id="transferMsg"></div>
    </div>

  </div>

  <!-- Transaction History -->
  <div class="card">
    <p class="section-title">Transaction History</p>
    <table class="txn-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Type</th>
          <th>Amount</th>
          <th>Balance After</th>
          <th>Status</th>
          <th>Counterparty</th>
          <th>Note</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="txnBody">
        <tr><td colspan="8" style="text-align:center;color:#6b7280;padding:24px">Loading…</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const $ = id => document.getElementById(id);

function cents(n) {
  const v = parseInt(n) || 0;
  return `$${Math.floor(v/100)}.${String(Math.abs(v)%100).padStart(2,'0')}`;
}

function showMsg(id, ok, text) {
  const el = $(id);
  el.className = `msg show ${ok ? 'ok' : 'err'}`;
  el.textContent = text;
}

async function loadBalance() {
  const r = await fetch('/api/wallet/balance').then(x=>x.json()).catch(()=>({ok:false}));
  if (r.ok) {
    $('balanceDisplay').textContent = r.balance_display;
    $('balanceCents').textContent = `${r.balance_cents} cents`;
  } else {
    $('balanceDisplay').textContent = 'Login required';
  }
}

function txnTypeBadge(t) {
  const labels = {
    deposit:      '<span class="type-deposit">↓ Deposit</span>',
    withdrawal:   '<span class="type-withdrawal">↑ Withdrawal</span>',
    transfer_in:  '<span class="type-transfer_in">⇐ Transfer In</span>',
    transfer_out: '<span class="type-transfer_out">⇒ Transfer Out</span>',
  };
  return labels[t] || t;
}

function statusBadge(s) {
  const map = {
    pending:   'badge-yellow',
    approved:  'badge-green',
    completed: 'badge-green',
    rejected:  'badge-red',
  };
  return `<span class="badge ${map[s]||'badge-blue'}">${s}</span>`;
}

async function loadTxns() {
  const r = await fetch('/api/wallet/transactions?limit=50').then(x=>x.json()).catch(()=>({ok:false}));
  const tbody = $('txnBody');
  if (!r.ok || !r.items?.length) {
    tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;color:#6b7280;padding:24px">${r.ok ? 'No transactions yet.' : 'Failed to load.'}</td></tr>`;
    return;
  }
  tbody.innerHTML = r.items.map(t => `
    <tr>
      <td class="mono">${t.id}</td>
      <td>${txnTypeBadge(t.txn_type)}</td>
      <td class="mono">${cents(t.amount_cents)}</td>
      <td class="mono">${cents(t.balance_after)}</td>
      <td>${statusBadge(t.status)}</td>
      <td>${t.ref_username ? `@${t.ref_username}` : '—'}</td>
      <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.note||'—'}</td>
      <td class="mono" style="white-space:nowrap">${(t.created_at||'').slice(0,16).replace('T',' ')}</td>
    </tr>
  `).join('');
}

async function doDeposit() {
  const amount = parseInt($('depositAmount').value);
  const note   = $('depositNote').value.trim();
  if (!amount || amount < 1000) return showMsg('depositMsg', false, 'Minimum deposit is $10.00 (1000 cents).');
  const r = await fetch('/api/wallet/deposit', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({amount_cents: amount, note: note||null})
  }).then(x=>x.json());
  showMsg('depositMsg', r.ok, r.ok ? r.message : r.error);
  if (r.ok) { loadTxns(); $('depositAmount').value=''; $('depositNote').value=''; }
}

async function doWithdraw() {
  const amount = parseInt($('withdrawAmount').value);
  const note   = $('withdrawNote').value.trim();
  if (!amount || amount < 5000) return showMsg('withdrawMsg', false, 'Minimum withdrawal is $50.00 (5000 cents).');
  const r = await fetch('/api/wallet/withdraw', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({amount_cents: amount, note: note||null})
  }).then(x=>x.json());
  showMsg('withdrawMsg', r.ok, r.ok ? r.message : r.error);
  if (r.ok) { loadBalance(); loadTxns(); $('withdrawAmount').value=''; $('withdrawNote').value=''; }
}

async function doTransfer() {
  const to     = $('transferTo').value.trim();
  const amount = parseInt($('transferAmount').value);
  const note   = $('transferNote').value.trim();
  if (!to)     return showMsg('transferMsg', false, 'Enter a recipient username.');
  if (!amount || amount < 100) return showMsg('transferMsg', false, 'Minimum transfer is $1.00 (100 cents).');
  const r = await fetch('/api/wallet/transfer', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({to_username: to, amount_cents: amount, note: note||null})
  }).then(x=>x.json());
  showMsg('transferMsg', r.ok, r.ok
    ? `Sent ${r.amount_display} to @${r.transferred_to}. New balance: ${r.balance_display}`
    : r.error);
  if (r.ok) { loadBalance(); loadTxns(); $('transferTo').value=''; $('transferAmount').value=''; $('transferNote').value=''; }
}

$('logoutBtn').addEventListener('click', async e => {
  e.preventDefault();
  await fetch('/auth/logout', {method:'POST'});
  location.href = '/public/auth/login.html';
});

loadBalance();
loadTxns();
</script>
</body>
</html>
