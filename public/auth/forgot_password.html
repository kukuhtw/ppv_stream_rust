<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Forgot Password — PPV Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/styles.css">
  <script src="/public/theme.js"></script>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-9 col-md-6 col-lg-4">
        <div class="text-center mb-4">
          <a href="/public/browse.html" class="text-decoration-none">
            <h1 class="fw-bold fs-3" data-platform="brand">🎬 PPV Stream</h1>
          </a>
        </div>
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h5 class="card-title mb-1">Forgot Password</h5>
            <p class="text-body-secondary small mb-4">Enter your email and we'll send a reset link.</p>
            <form method="post" action="/auth/forgot">
              <div class="mb-4">
                <label for="email" class="form-label">Email</label>
                <input id="email" name="email" type="email" class="form-control" required autocomplete="email">
              </div>
              <button class="btn btn-primary w-100 mb-3">Send Reset Link</button>
              <p class="text-center small mb-0"><a href="/public/auth/login.html">← Back to Sign In</a></p>
            </form>
          </div>
        </div>
        <div class="text-center mt-3">
          <button class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()" id="themeToggle">☀️</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
