<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Reset Password — PPV Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/styles.css">
  <script src="/public/theme.js"></script>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-9 col-md-6 col-lg-4">
        <div class="text-center mb-4">
          <a href="/public/browse.html" class="text-decoration-none">
            <h1 class="fw-bold fs-3" data-platform="brand">🎬 PPV Stream</h1>
          </a>
        </div>
        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h5 class="card-title mb-1">Set New Password</h5>
            <p class="text-body-secondary small mb-4">Choose a strong password (min. 8 characters).</p>
            <form method="post" action="/auth/reset">
              <input type="hidden" name="token" id="tokenField">
              <div class="mb-4">
                <label for="newPwd" class="form-label">New Password</label>
                <div class="input-group">
                  <input id="newPwd" name="password" type="password" class="form-control" required minlength="8">
                  <button type="button" class="btn btn-outline-secondary" id="togglePass">👁️</button>
                </div>
              </div>
              <button class="btn btn-primary w-100 mb-3">Update Password</button>
              <p class="text-center small mb-0"><a href="/public/auth/login.html">← Back to Sign In</a></p>
            </form>
          </div>
        </div>
        <div class="text-center mt-3">
          <button class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()" id="themeToggle">☀️</button>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById('tokenField').value = new URLSearchParams(location.search).get('token') || '';
const tp = document.getElementById('togglePass'), pw = document.getElementById('newPwd');
tp.addEventListener('mousedown', () => { pw.type='text'; tp.textContent='🙈'; });
tp.addEventListener('mouseup',   () => { pw.type='password'; tp.textContent='👁️'; });
tp.addEventListener('mouseleave',() => { pw.type='password'; tp.textContent='👁️'; });
</script>
</body>
</html>
