<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <title>Create Account — PPV Stream</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/styles.css">
  <script src="/public/theme.js"></script>
</head>
<body>
<div class="min-vh-100 d-flex align-items-center py-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-9 col-md-6 col-lg-4">

        <div class="text-center mb-4">
          <a href="/public/browse.html" class="text-decoration-none">
            <h1 class="fw-bold fs-3" data-platform="brand">🎬 PPV Stream</h1>
          </a>
          <p class="text-body-secondary small" data-platform="tagline">Pay-Per-View Streaming Platform</p>
        </div>

        <div id="alertBox" class="alert d-none" role="alert"></div>

        <div class="card shadow-sm">
          <div class="card-body p-4">
            <h5 class="card-title mb-4">Create Account</h5>
            <form method="post" action="/auth/register">
              <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input id="username" name="username" class="form-control" required autocomplete="username">
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input id="email" name="email" type="email" class="form-control" required autocomplete="email">
              </div>
              <div class="mb-4">
                <label for="password" class="form-label">Password <span class="text-body-secondary small">(min. 8 chars)</span></label>
                <div class="input-group">
                  <input id="password" name="password" type="password" class="form-control" required autocomplete="new-password">
                  <button type="button" class="btn btn-outline-secondary" id="togglePass">👁️</button>
                </div>
              </div>
              <button class="btn btn-primary w-100 mb-3">Create Account</button>
              <p class="text-center small mb-0">Already have an account? <a href="/auth/login">Sign in</a></p>
            </form>
          </div>
        </div>

        <div class="text-center mt-3">
          <button class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()" id="themeToggle">☀️</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
const tp = document.getElementById('togglePass'), pw = document.getElementById('password');
tp.addEventListener('mousedown', () => { pw.type='text'; tp.textContent='🙈'; });
tp.addEventListener('mouseup',   () => { pw.type='password'; tp.textContent='👁️'; });
tp.addEventListener('mouseleave',() => { pw.type='password'; tp.textContent='👁️'; });

(function(){
  const p = new URLSearchParams(location.search), status = p.get('status'), reason = p.get('reason');
  if (!status) return;
  const map = { missing_field:'Fill in all fields.', invalid_email:'Invalid email address.', weak_password:'Password is too weak (min. 8 characters).', email_taken:'Email is already registered.', server_error:'Server error. Please try again.' };
  const box = document.getElementById('alertBox');
  box.textContent = status === 'ok' ? 'Account created! Please sign in.' : (map[reason] || `Registration failed. (${reason || 'unknown'})`);
  box.className = 'alert ' + (status === 'ok' ? 'alert-success' : 'alert-danger');
})();
</script>
</body>
</html>
