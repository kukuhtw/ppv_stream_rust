<!-- public/auth/register.html -->
<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Register</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-12 col-sm-9 col-md-7 col-lg-5">

      <h1 class="mb-3">Register</h1>
      <div id="alert" class="alert d-none" role="alert"></div>

      <div class="card shadow-sm">
        <div class="card-body">
          <form method="post" action="/auth/register">
            <div class="mb-3">
              <label for="regUsername" class="form-label">Username</label>
              <input id="regUsername" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="regEmail" class="form-label">Email</label>
              <input id="regEmail" name="email" type="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="regPassword" class="form-label">Password</label>
              <div class="input-group">
                <input id="regPassword" name="password" type="password" class="form-control" required>
                <button type="button" id="toggleRegPass" class="btn btn-outline-secondary"
                        title="Tahan mouse untuk melihat password">👁️</button>
              </div>
            </div>
            <button class="btn btn-primary w-100">Sign Up</button>
          </form>
        </div>
      </div>

      <p class="text-center mt-3">Sudah punya akun? <a href="/auth/login">Login</a></p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* Toggle password */
const regPass = document.getElementById('regPassword');
const toggleRegPass = document.getElementById('toggleRegPass');
toggleRegPass.addEventListener('mousedown', () => { regPass.type = 'text'; toggleRegPass.textContent = '🙈'; });
toggleRegPass.addEventListener('mouseup',   () => { regPass.type = 'password'; toggleRegPass.textContent = '👁️'; });
toggleRegPass.addEventListener('mouseleave',() => { regPass.type = 'password'; toggleRegPass.textContent = '👁️'; });

/* Alert status & reason */
(function () {
  const box = document.getElementById('alert');
  const p = new URLSearchParams(location.search);
  const status = p.get('status');
  const reason = p.get('reason');
  if (!status) return;
  const map = {
    missing_field: 'Lengkapi semua field.',
    invalid_email: 'Format email tidak valid.',
    weak_password: 'Password terlalu lemah.',
    email_taken: 'Email sudah terdaftar.',
    server_error: 'Terjadi masalah di server. Coba lagi.'
  };
  let msg = status === 'ok'
    ? 'Registrasi berhasil. Silakan login.'
    : (map[reason] || `Registrasi gagal. (${reason || 'unknown'})`);
  box.textContent = msg;
  box.classList.add(status === 'ok' ? 'alert-success' : 'alert-danger');
  box.classList.remove('d-none');
})();
</script>
</body>
</html>
