<!-- public/auth/login.html -->
<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <title>Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/public/styles.css">
</head>
<body class="bg-light">

<div class="container py-4">

  <!-- ===== Login card ===== -->
  <div class="row justify-content-center mb-5">
    <div class="col-12 col-sm-9 col-md-7 col-lg-5">
      <h1 class="mb-3">Login</h1>
      <div id="alert" class="alert d-none" role="alert"></div>
      <div class="card shadow-sm">
        <div class="card-body">
          <form method="post" action="/auth/login">
            <div class="mb-3">
              <label for="loginEmail" class="form-label">Email</label>
              <input id="loginEmail" name="email" type="email" class="form-control" required>
            </div>
            <div class="mb-3">
              <label for="loginPassword" class="form-label">Password</label>
              <div class="input-group">
                <input id="loginPassword" name="password" type="password" class="form-control" required>
                <button type="button" id="toggleLoginPass" class="btn btn-outline-secondary" title="Tahan mouse untuk melihat password">👁️</button>
              </div>
            </div>
            <button class="btn btn-primary w-100">Login</button>
          </form>
        </div>
      </div>
      <p class="text-center mt-3 mb-1">Lupa password? <a href="/auth/forgot">Reset</a></p>
      <p class="text-center">Belum punya akun? <a href="/auth/register">Daftar</a></p>
    </div>
  </div>

  <!-- ===== Video list preview ===== -->
  <h2 class="mb-3">Daftar Video</h2>
  <div class="mb-3">
    <input id="q" class="form-control" style="max-width:480px"
           placeholder="Cari judul / owner / deskripsi…" aria-label="Pencarian">
  </div>
  <div id="videos" class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-3">
    <div class="col"><div class="skeleton"></div></div>
    <div class="col"><div class="skeleton"></div></div>
    <div class="col"><div class="skeleton"></div></div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
/* === Toggle show/hide password === */
const loginPass = document.getElementById('loginPassword');
const toggleLoginPass = document.getElementById('toggleLoginPass');
toggleLoginPass.addEventListener('mousedown', () => { loginPass.type = 'text'; toggleLoginPass.textContent = '🙈'; });
toggleLoginPass.addEventListener('mouseup',   () => { loginPass.type = 'password'; toggleLoginPass.textContent = '👁️'; });
toggleLoginPass.addEventListener('mouseleave',() => { loginPass.type = 'password'; toggleLoginPass.textContent = '👁️'; });

/* === Alert status & reason === */
(function () {
  const box = document.getElementById('alert');
  const p = new URLSearchParams(location.search);
  const status = p.get('status');
  const reason = p.get('reason');
  if (!status) return;
  const map = {
    missing_field: 'Lengkapi semua field.',
    invalid_email: 'Format email tidak valid.',
    bad_credentials: 'Email atau password salah.',
    server_error: 'Terjadi masalah di server. Coba lagi.',
  };
  let msg = status === 'ok' ? 'Login berhasil.' : (map[reason] || `Login gagal. (${reason || 'unknown'})`);
  box.textContent = msg;
  box.classList.add(status === 'ok' ? 'alert-success' : 'alert-danger');
  box.classList.remove('d-none');
})();

/* ==== Util & Kurs ==== */
const numIDR = new Intl.NumberFormat('id-ID');
let USD_TO_IDR = 17000;

function escapeHtml(s){
  return String(s ?? '')
    .replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')
    .replaceAll('"','&quot;').replaceAll("'",'&#039;');
}

async function resolveUsdToIdr(){
  try{
    const r = await fetch('/api/kurs');
    const j = await r.json();
    if (r.ok && j && typeof j.usd_to_idr === 'number') USD_TO_IDR = j.usd_to_idr;
  }catch {}
}

let allVideos = [];

function render(list){
  const wrap = document.getElementById('videos');
  if (!list.length){
    wrap.innerHTML = '<div class="col-12"><p class="text-muted">Belum ada video atau tidak ada yang cocok.</p></div>';
    return;
  }
  wrap.innerHTML = list.map(v => {
    const priceIDR = Math.round((v.price_cents || 0) / 100 * USD_TO_IDR);
    const desc = (v.description || '').trim();
    return `
      <div class="col">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="card-title">${escapeHtml(v.title)}</h5>
            <p class="mb-1">👤 ${escapeHtml(v.owner_name)}</p>
            <p class="mb-1 fw-semibold">💰 Rp ${numIDR.format(priceIDR)}</p>
            ${desc
              ? `<p class="card-text mt-2" style="white-space:pre-wrap">${escapeHtml(desc)}</p>`
              : `<p class="card-text text-muted mt-2">(Belum ada deskripsi)</p>`}
          </div>
        </div>
      </div>`;
  }).join('');
}

function applyFilters(){
  const q = document.getElementById('q').value.trim().toLowerCase();
  let list = [...allVideos];
  if (q) list = list.filter(v =>
    `${v.title} ${v.owner_name} ${v.description||''}`.toLowerCase().includes(q));
  list.sort((a,b) => (b.created_at > a.created_at) ? 1 : (b.created_at < a.created_at ? -1 : 0));
  render(list);
}

let t;
document.getElementById('q').addEventListener('input', () => { clearTimeout(t); t = setTimeout(applyFilters, 200); });

(async function init(){
  await resolveUsdToIdr();
  try{
    const res = await fetch('/api/videos');
    const data = await res.json();
    if (!res.ok || data.ok === false) throw new Error(data.error || 'Gagal memuat /api/videos');
    allVideos = Array.isArray(data.videos) ? data.videos : [];
    applyFilters();
  }catch(e){
    document.getElementById('videos').innerHTML =
      `<div class="col-12"><p class="text-muted">Gagal memuat video: ${escapeHtml(String(e))}</p></div>`;
  }
})();
</script>
</body>
</html>
